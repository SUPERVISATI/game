<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏆 MEU RANKING</title>
    <style>
        /* ============================================================
           RESET E BASE
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @import url('https://fonts.googleapis.com/css?family=Carter+One');

        body {
            background: #0a0a1a;
            font-family: 'Carter One', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            padding: clamp(6px, 1.5vw, 10px);
            background-image: radial-gradient(ellipse at center, #1a1a3e 0%, #0a0a1a 100%);
        }

        /* ============================================================
           BOTÕES GAME - VERSÃO TOTALMENTE RESPONSIVA
           ============================================================ */
        .game-btn {
            position: relative;
            top: 0;
            cursor: pointer;
            text-decoration: none !important;
            outline: none !important;
            font-family: 'Carter One', sans-serif;
            font-size: clamp(1px, 1.5vw, 28px);
            line-height: 1.2em;
            letter-spacing: .08em;
            border: none;
            background: repeating-linear-gradient(45deg, #3ebbf7, #3ebbf7 5px, #45b1f4 5px, #45b1f4 10px);
            border-bottom: 4px solid rgba(16, 91, 146, 0.5);
            border-top: 3px solid rgba(255,255,255,.3);
            color: #fff !important;
            border-radius: 12px;
            padding: clamp(8px, 1.5vw, 14px) clamp(12px, 2.5vw, 25px) clamp(10px, 2vw, 18px);
            box-shadow: 0 8px 0 #266b91, 0 10px 1px 1px rgba(0,0,0,.3), 0 12px 0 5px #12517d, 0 14px 0 5px #1a6b9a, 0 17px 0 5px #0c405e, 0 17px 1px 6px rgba(0,0,0,.3);
            transition: all 0.08s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: clamp(36px, 7vh, 55px);
            min-width: clamp(60px, 12vw, 120px);
            width: auto;
            text-shadow: 2px 2px 1px #0066a2, -2px 2px 1px #0066a2, 2px -2px 1px #0066a2, -2px -2px 1px #0066a2, 0px 2px 1px #0066a2, 0px -2px 1px #0066a2, 0px 4px 1px #004a87, 2px 4px 1px #004a87, -2px 4px 1px #004a87;
            touch-action: manipulation;
            flex-shrink: 0;
            word-break: keep-all;
            white-space: nowrap;
        }

        .game-btn:active {
            top: 4px;
            box-shadow: 0 4px 0 #266b91, 0 6px 1px 1px rgba(0,0,0,.3), 0 8px 0 5px #12517d, 0 10px 0 5px #1a6b9a, 0 13px 0 5px #0c405e, 0 13px 1px 6px rgba(0,0,0,.3);
        }

        .game-btn::before {
            content: '';
            height: 5%;
            position: absolute;
            width: 15%;
            background: rgba(255,255,255,0.6);
            right: 10%;
            top: -3%;
            border-radius: 99px;
        }

        .game-btn::after {
            content: '';
            height: 5%;
            position: absolute;
            width: 5%;
            background: rgba(255,255,255,0.6);
            right: 5%;
            top: -3%;
            border-radius: 99px;
        }

        /* CORES DOS BOTÕES */
        .game-btn.orange {
            background: repeating-linear-gradient(45deg, #ffc800, #ffc800 5px, #ffc200 5px, #ffc200 10px);
            box-shadow: 0 8px 0 #b76113, 0 10px 1px 1px rgba(0,0,0,.3), 0 12px 0 5px #75421f, 0 14px 0 5px #8a542b, 0 17px 0 5px #593116, 0 17px 1px 6px rgba(0,0,0,.3);
            border-bottom: 4px solid rgba(205, 102, 0, 0.5);
            text-shadow: 2px 2px 1px #e78700, -2px 2px 1px #e78700, 2px -2px 1px #e78700, -2px -2px 1px #e78700, 0px 2px 1px #e78700, 0px -2px 1px #e78700, 0px 4px 1px #c96100, 2px 4px 1px #c96100, -2px 4px 1px #c96100;
        }

        .game-btn.orange:active {
            top: 4px;
            box-shadow: 0 4px 0 #b76113, 0 6px 1px 1px rgba(0,0,0,.3), 0 8px 0 5px #75421f, 0 10px 0 5px #8a542b, 0 13px 0 5px #593116, 0 13px 1px 6px rgba(0,0,0,.3);
        }

        .game-btn.red {
            background: repeating-linear-gradient(45deg, #ff4f4c, #ff4f4c 5px, #ff4643 5px, #ff4643 10px);
            box-shadow: 0 8px 0 #ae2725, 0 10px 1px 1px rgba(0,0,0,.3), 0 12px 0 5px #831614, 0 14px 0 5px #a33634, 0 17px 0 5px #631716, 0 17px 1px 6px rgba(0,0,0,.3);
            border-bottom: 4px solid rgba(160, 25, 23, 0.5);
            text-shadow: 2px 2px 1px #d72d21, -2px 2px 1px #d72d21, 2px -2px 1px #d72d21, -2px -2px 1px #d72d21, 0px 2px 1px #d72d21, 0px -2px 1px #d72d21, 0px 4px 1px #930704, 2px 4px 1px #930704, -2px 4px 1px #930704;
        }

        .game-btn.red:active {
            top: 4px;
            box-shadow: 0 4px 0 #ae2725, 0 6px 1px 1px rgba(0,0,0,.3), 0 8px 0 5px #831614, 0 10px 0 5px #a33634, 0 13px 0 5px #631716, 0 13px 1px 6px rgba(0,0,0,.3);
        }

        .game-btn.green {
            background: repeating-linear-gradient(45deg, #54d440, #54d440 5px, #52cc3f 5px, #52cc3f 10px);
            box-shadow: 0 8px 0 #348628, 0 10px 1px 1px rgba(0,0,0,.3), 0 12px 0 5px #2a6d20, 0 14px 0 5px #39822e, 0 17px 0 5px #1d4c16, 0 17px 1px 6px rgba(0,0,0,.3);
            border-bottom: 4px solid rgba(40, 117, 29, 0.5);
            text-shadow: 2px 2px 1px #348628, -2px 2px 1px #348628, 2px -2px 1px #348628, -2px -2px 1px #348628, 0px 2px 1px #348628, 0px -2px 1px #348628, 0px 4px 1px #1d4c16, 2px 4px 1px #1d4c16, -2px 4px 1px #1d4c16;
        }

        .game-btn.green:active {
            top: 4px;
            box-shadow: 0 4px 0 #348628, 0 6px 1px 1px rgba(0,0,0,.3), 0 8px 0 5px #2a6d20, 0 10px 0 5px #39822e, 0 13px 0 5px #1d4c16, 0 13px 1px 6px rgba(0,0,0,.3);
        }

        /* MODIFICADORES DE TAMANHO */
        .game-btn.full {
            width: 100%;
            justify-content: center;
            min-width: unset;
        }

        .game-btn.big {
            font-size: clamp(14px, 3.8vw, 34px);
            padding: clamp(10px, 2vw, 18px) clamp(14px, 3vw, 30px) clamp(12px, 2.5vw, 24px);
            min-height: clamp(22px, 8vh, 70px);
            min-width: clamp(35px, 15vw, 160px);
        }

        .game-btn.small {
            font-size: clamp(1px, 1.2vw, 18px);
            padding: clamp(6px, 1.2vw, 10px) clamp(8px, 1.8vw, 16px) clamp(8px, 1.5vw, 14px);
            min-height: clamp(30px, 5vh, 40px);
            min-width: clamp(50px, 10vw, 80px);
        }

        /* BOTÃO RANKING DESTACADO */
        .btn-ranking-destaque {
            width: 100% !important;
            font-size: clamp(1px, 5vw, 40px) !important;
            padding: clamp(1px, 0.1vw, 20px) clamp(1px, 1.5vw, 20px) clamp(1px, 1vw, 26px) !important;
            min-height: clamp(1px, 10vh, 80px) !important;
            min-width: unset !important;
            letter-spacing: 0.15em !important;
            text-shadow: 3px 3px 2px #1d4c16, -3px 3px 2px #1d4c16, 3px -3px 2px #1d4c16, -3px -3px 2px #1d4c16, 0px 3px 2px #1d4c16, 0px -3px 2px #1d4c16, 0px 5px 2px #0d3a0a, 3px 5px 2px #0d3a0a, -3px 5px 2px #0d3a0a !important;
            box-shadow: 0 10px 0 #2a6d20, 0 12px 1px 1px rgba(0,0,0,.3), 0 14px 0 5px #1d4c16, 0 16px 0 5px #2a6d20, 0 19px 0 5px #0d3a0a, 0 19px 1px 6px rgba(0,0,0,.3) !important;
            animation: pulseRanking 2s ease-in-out infinite;
            white-space: normal !important;
        }

        .btn-ranking-destaque:active {
            top: 5px !important;
            box-shadow: 0 5px 0 #2a6d20, 0 7px 1px 1px rgba(0,0,0,.3), 0 9px 0 5px #1d4c16, 0 11px 0 5px #2a6d20, 0 14px 0 5px #0d3a0a, 0 14px 1px 6px rgba(0,0,0,.3) !important;
        }

        .btn-ranking-destaque::before {
            height: 1% !important;
            width: 30% !important;
            background: rgba(255,255,255,0.5) !important;
        }

        .btn-ranking-destaque::after {
            height: 15% !important;
            width: 4% !important;
            background: rgba(255,255,255,0.5) !important;
        }

        @keyframes pulseRanking {
            0%, 100% { 
                transform: scale(1);
                box-shadow: 0 10px 0 #2a6d20, 0 12px 1px 1px rgba(0,0,0,.3), 0 14px 0 5px #1d4c16, 0 16px 0 5px #2a6d20, 0 19px 0 5px #0d3a0a, 0 19px 1px 6px rgba(0,0,0,.3), 0 0 30px rgba(84, 212, 64, 0.2);
            }
            50% { 
                transform: scale(1.02);
                box-shadow: 0 10px 0 #2a6d20, 0 12px 1px 1px rgba(0,0,0,.3), 0 14px 0 5px #1d4c16, 0 16px 0 5px #2a6d20, 0 19px 0 5px #0d3a0a, 0 19px 1px 6px rgba(0,0,0,.3), 0 0 60px rgba(84, 212, 64, 0.4);
            }
        }

        /* ============================================================
           HEADER RESPONSIVO
           ============================================================ */
        .header {
            width: 100%;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: clamp(6px, 1.5vw, 10px);
        }

        .header-title {
            font-size: clamp(18px, 4.5vw, 36px);
            color: #FFD700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Carter One', sans-serif;
            flex-wrap: wrap;
        }

        .header-title span {
            font-size: clamp(22px, 5vw, 44px);
        }

        .player-card {
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #FFD700;
            border-radius: 14px;
            padding: clamp(4px, 1vw, 8px) clamp(10px, 2.5vw, 18px);
            display: flex;
            align-items: center;
            gap: clamp(6px, 1.5vw, 12px);
            flex-wrap: wrap;
            min-height: clamp(38px, 7vh, 48px);
            flex: 1;
            min-width: 150px;
            justify-content: center;
        }

        .player-card .avatar {
            font-size: clamp(20px, 4vw, 32px);
        }

        .player-card .p-name {
            font-size: clamp(14px, 3vw, 24px);
            color: #FFD700;
            font-family: 'Carter One', sans-serif;
        }

        .player-card .p-coins {
            font-size: clamp(12px, 2.5vw, 22px);
            color: #fff;
            background: rgba(0,0,0,0.4);
            padding: clamp(2px, 0.5vw, 4px) clamp(8px, 2vw, 14px);
            border-radius: 10px;
            font-family: 'Carter One', sans-serif;
        }

        .header-actions {
            display: flex;
            gap: clamp(6px, 1.5vw, 10px);
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .header-actions .game-btn {
            flex: 1;
            min-width: clamp(80px, 18vw, 180px);
            max-width: 100%;
        }

        /* ============================================================
           ESTATÍSTICAS RÁPIDAS
           ============================================================ */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: clamp(4px, 1vw, 10px);
            margin-bottom: clamp(8px, 2vw, 12px);
        }

        .stat-card {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: clamp(6px, 1.5vw, 12px) clamp(4px, 1vw, 10px);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-card .label {
            font-size: clamp(8px, 1.8vw, 14px);
            color: #888;
            font-family: 'Carter One', sans-serif;
        }

        .stat-card .value {
            font-size: clamp(14px, 3.5vw, 28px);
            color: #FFD700;
            font-family: 'Carter One', sans-serif;
            margin-top: 2px;
        }

        .stat-card .emoji {
            font-size: clamp(16px, 3.5vw, 28px);
        }

        /* ============================================================
           BUSCA
           ============================================================ */
        .search-area {
            display: flex;
            gap: clamp(6px, 1.5vw, 10px);
            margin-bottom: clamp(8px, 2vw, 12px);
            align-items: center;
            flex-wrap: wrap;
        }

        .search-area input {
            flex: 1;
            min-width: 150px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: clamp(10px, 2vw, 14px) clamp(14px, 3vw, 20px);
            color: #fff;
            font-size: clamp(14px, 3.5vw, 24px);
            font-family: 'Carter One', sans-serif;
            outline: none;
            transition: border-color 0.3s;
            min-height: clamp(40px, 8vh, 55px);
        }

        .search-area input:focus {
            border-color: #FFD700;
        }

        .search-area input::placeholder {
            color: #555;
            font-size: clamp(12px, 3vw, 20px);
        }

        .search-area .game-btn.small {
            flex-shrink: 0;
        }

        /* ============================================================
           LISTA DE RANKING
           ============================================================ */
        .ranking-container {
            max-height: clamp(300px, 55vh, 70vh);
            overflow-y: auto;
            padding-right: 4px;
            margin-bottom: clamp(8px, 2vw, 12px);
        }

        .ranking-container::-webkit-scrollbar {
            width: 4px;
        }

        .ranking-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .ranking-container::-webkit-scrollbar-thumb {
            background: #FFD700;
            border-radius: 10px;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 1vw, 8px);
        }

        .rank-card {
            background: rgba(0,0,0,0.35);
            border-radius: 14px;
            padding: clamp(8px, 1.5vw, 12px) clamp(10px, 2vw, 16px);
            display: grid;
            grid-template-columns: clamp(28px, 5vw, 50px) clamp(28px, 4.5vw, 44px) 1fr auto clamp(24px, 4vw, 44px);
            align-items: center;
            gap: clamp(4px, 1vw, 8px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            min-height: clamp(44px, 8vh, 60px);
        }

        .rank-card.player-highlight {
            background: rgba(255, 215, 0, 0.15);
            border: 2px solid #FFD700;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255,215,0,0.1); }
            50% { box-shadow: 0 0 30px rgba(255,215,0,0.25); }
        }

        .rank-card .pos {
            font-size: clamp(11px, 2.8vw, 24px);
            font-weight: bold;
            color: #aaa;
            font-family: 'Carter One', sans-serif;
            text-align: center;
            min-width: clamp(24px, 4vw, 40px);
        }

        .rank-card .pos.top1 { color: #FFD700; }
        .rank-card .pos.top2 { color: #C0C0C0; }
        .rank-card .pos.top3 { color: #CD7F32; }

        .rank-card .medal {
            font-size: clamp(16px, 4vw, 34px);
            text-align: center;
        }

        .rank-card .r-name {
            font-size: clamp(11px, 2.5vw, 22px);
            color: #fff;
            font-family: 'Carter One', sans-serif;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .rank-card .r-name.player-name {
            color: #FFD700;
        }

        .rank-card .r-name .star {
            color: #FFD700;
            margin-right: 4px;
        }

        .rank-card .r-coins {
            font-size: clamp(10px, 2.2vw, 20px);
            color: #FFD700;
            font-family: 'Carter One', sans-serif;
            text-align: right;
            white-space: nowrap;
        }

        .rank-card .r-badge {
            display: inline-block;
            padding: clamp(1px, 0.3vw, 2px) clamp(4px, 1.5vw, 12px);
            border-radius: 10px;
            font-size: clamp(8px, 1.8vw, 14px);
            font-weight: bold;
            font-family: 'Carter One', sans-serif;
            text-align: center;
            min-width: clamp(20px, 4vw, 32px);
        }

        .badge-gold { background: #FFD700; color: #000; }
        .badge-silver { background: #C0C0C0; color: #000; }
        .badge-bronze { background: #CD7F32; color: #fff; }
        .badge-platinum { background: #E5E4E2; color: #000; }
        .badge-diamond { background: #B9F2FF; color: #000; }
        .badge-player { background: #FFD700; color: #000; animation: badgePulse 1.5s ease-in-out infinite; }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ============================================================
           LEGENDA
           ============================================================ */
        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(4px, 1vw, 10px);
            justify-content: center;
            padding: clamp(8px, 2vw, 14px);
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: clamp(4px, 1vw, 8px);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: clamp(3px, 0.8vw, 6px);
            font-size: clamp(9px, 2vw, 16px);
            color: #aaa;
            font-family: 'Carter One', sans-serif;
            white-space: nowrap;
        }

        .legend-item .medal {
            font-size: clamp(14px, 3vw, 26px);
        }

        /* ============================================================
           MODAL FULLSCREEN - TOTALMENTE RESPONSIVO
           ============================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Altura dinâmica para mobile */
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: clamp(10px, 4vw, 30px);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-box {
           
            padding: clamp(20px, 5vw, 50px) clamp(16px, 4vw, 40px) clamp(24px, 6vw, 50px);
            border-radius: min(30px, 5vw);
        
            text-align: center;
            max-width: min(100%, 92vw);
            width: 100%;
            max-height: 90vh;
            max-height: 90dvh;
            overflow-y: auto;
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: clamp(8px, 2vh, 20px);
        }

        @keyframes slideUp {
            from { transform: translateY(60px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .modal-box .big-emoji {
            font-size: clamp(48px, 15vw, 100px);
            display: block;
            line-height: 1.2;
            margin-bottom: clamp(2px, 0.5vh, 5px);
        }

        .modal-box h2 {
            color: #FFD700;
            font-size: clamp(22px, 6vw, 44px);
            font-family: 'Carter One', sans-serif;
            margin: 0;
            line-height: 1.2;
            word-break: break-word;
        }

        .modal-box p {
            color: #aaa;
            font-size: clamp(14px, 3.5vw, 24px);
            font-family: 'Carter One', sans-serif;
            margin: 0;
            line-height: 1.4;
            word-break: break-word;
        }

        .modal-box p br {
            display: inline;
        }

        .modal-box input {
            width: 100%;
            padding: clamp(14px, 3.5vw, 22px) clamp(16px, 4vw, 28px);
            border-radius: 16px;
            border: 2px solid rgba(255, 215, 0, 0.25);
            background: rgba(0,0,0,0.4);
            color: #fff;
            font-size: clamp(18px, 4.5vw, 32px);
            font-family: 'Carter One', sans-serif;
            outline: none;
            transition: border-color 0.3s, transform 0.2s;
            text-align: center;
            min-height: clamp(50px, 10vh, 75px);
            max-width: 100%;
            box-sizing: border-box;
        }

        .modal-box input:focus {
            border-color: #FFD700;
            transform: scale(1.02);
        }

        .modal-box input::placeholder {
            color: #555;
            font-size: clamp(14px, 3.5vw, 24px);
        }

        .modal-box .hint {
            color: #555;
            font-size: clamp(10px, 2.2vw, 18px);
            font-family: 'Carter One', sans-serif;
            margin: 0;
            line-height: 1.3;
        }

        .modal-box .game-btn {
            width: 100%;
            font-size: clamp(18px, 2.5vw, 34px) !important;
            padding: clamp(16px, 3.5vw, 24px) clamp(16px, 3.5vw, 24px) clamp(20px, 4vw, 30px) !important;
            min-height: clamp(55px, 11vh, 80px) !important;
            min-width: unset !important;
            margin: 0;
            flex-shrink: 0;
        }

        .modal-box .game-btn:active {
            top: 4px !important;
        }

        /* Scroll do modal para telas muito pequenas */
        .modal-box::-webkit-scrollbar {
            width: 3px;
        }

                    name: name,
                    totalCoins: 0,

                    levelCoins: {},
                    created: new Date().toISOString(),
                    lastUpdate: new Date().toISOString()
                };
                return StorageManager.set('playerData', playerData);

            addCoinsAndDistribute(amount) {
                const player = this.getPlayer();
                if (!player) return false;

                const sharePercent = 0.20;
                const shareAmount = Math.floor(amount * sharePercent);
                const playerAmount = amount - shareAmount;

                player.totalCoins = (player.totalCoins || 0) + playerAmount;
                player.lastUpdate = new Date().toISOString();
                StorageManager.set('playerData', player);

                if (shareAmount > 0 && FAKE_PLAYERS.length > 0) {

                    const growth = Math.floor(playerCoins * growthRate * (0.2 + Math.random() * 0.3));
                    const randomBonus = Math.floor(Math.random() * 50) - 25;
                    const newCoins = Math.max(1, player.coins + growth + randomBonus);

                    return {
                        ...player,
                        coins: newCoins,
                        days: player.days + (Math.random() > 0.7 ? 1 : 0)
                    };
                });
            }
        };

        // ============================================================
        // 🎨 FUNÇÕES DE INTERFACE
        // ============================================================

        function showNotification(message, emoji = '✅') {
            const notification = document.getElementById('notification');
            const messageEl = document.getElementById('notificationMessage');
            const emojiEl = notification.querySelector('.emoji');

            emojiEl.textContent = emoji;
            messageEl.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        function renderRanking(players) {
            const list = document.getElementById('rankingList');
            const playerName = PlayerManager.getPlayerName();

            list.innerHTML = '';

            if (!players || players.length === 0) {
                list.innerHTML = `
                    <div style="text-align:center;padding:clamp(20px,5vw,40px) clamp(12px,3vw,20px);color:#666;font-size:clamp(14px,3.5vw,24px);font-family:'Carter One',sans-serif;">
                        Nenhum jogador encontrado
                    </div>
                `;
                return;
            }

            players.forEach((player, index) => {
                const position = index + 1;
                const isPlayer = player.isPlayer || (player.name === playerName && !player.isFake);
                const card = document.createElement('div');
                card.className = 'rank-card';
                if (isPlayer) {
                    card.classList.add('player-highlight');
                }

                const medal = RankingManager.getMedalForPosition(position);
                const badgeClass = isPlayer ? 'badge-player' : RankingManager.getBadgeClass(position);
                const posClass = RankingManager.getPosClass(position);
                const displayName = player.name || 'Anônimo';

                const nameDisplay = isPlayer ? `<span class="star">⭐</span>${displayName}` : displayName;

                card.innerHTML = `
                    <div class="pos ${posClass}">#${position}</div>
                    <div class="medal">${medal}</div>
                    <div class="r-name ${isPlayer ? 'player-name' : ''}">${nameDisplay}</div>
                    <div class="r-coins">${RankingManager.formatCoins(player.coins)}</div>
                    <div class="r-badge ${badgeClass}">${medal}</div>
                `;

                list.appendChild(card);
            });

            const total = players.length;
            const simulatedTotal = Math.floor(Math.random() * (1569533 - 598052 + 1)) + 598052;
            document.getElementById('totalPlayers').textContent = simulatedTotal.toLocaleString('pt-BR');

            const playerPos = RankingManager.getPlayerPosition();
            document.getElementById('playerPosition').textContent = playerPos !== '-' ? playerPos + 'º' : '-';

            const totalCoins = players.reduce((sum, p) => sum + p.coins, 0);
            document.getElementById('totalCoinsRanking').textContent = Math.floor(totalCoins).toLocaleString('pt-BR');

            const player = PlayerManager.getPlayer();
            if (player) {
                document.getElementById('playerNameDisplay').textContent = player.name;
                document.getElementById('playerCoinsDisplay').textContent = '🪙 ' + Math.floor(player.totalCoins || 0).toLocaleString('pt-BR');
            } else {
                document.getElementById('playerNameDisplay').textContent = 'Visitante';
                document.getElementById('playerCoinsDisplay').textContent = '🪙 0';
            }
        }

        function filterRanking() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const players = RankingManager.getRanking();

            if (!searchTerm) {
                renderRanking(players);
                return;
            }

            const filtered = players.filter(p =>
                p.name && p.name.toLowerCase().includes(searchTerm)
            );

            renderRanking(filtered);
        }

        function updateRanking() {
            showNotification('Atualizando ranking...', '🔄');

            const player = PlayerManager.getPlayer();
            if (player) {
                const earnedCoins = Math.floor(Math.random() * 4900) + 100;
                
                PlayerManager.addCoinsAndDistribute(earnedCoins);
                
                const updatedPlayer = PlayerManager.getPlayer();
                
                const updatedFakes = RankingManager.updateFakePlayers(updatedPlayer.totalCoins || 0);
                updatedFakes.forEach((fake, index) => {
                    if (FAKE_PLAYERS[index]) {
                        FAKE_PLAYERS[index].coins = fake.coins;
                        FAKE_PLAYERS[index].days = fake.days;
                    }
                });
                StorageManager.set('fakePlayersData', FAKE_PLAYERS);

                const allPlayers = RankingManager.getAllPlayers();
                const sorted = allPlayers.sort((a, b) => b.coins - a.coins);
                renderRanking(sorted);
                
                showNotification(`+${earnedCoins.toLocaleString()} moedas coletadas! 20% compartilhado!`, '💰');
            } else {
                const fakes = FAKE_PLAYERS.map(p => ({ ...p, isFake: true }));
                renderRanking(fakes);
                showNotification('Cadastre-se para participar!', '⚠️');
            }
        }

        // ============================================================
        // 🔐 MODAL FULLSCREEN DE CADASTRO - VERSÃO RESPONSIVA
        // ============================================================
        function showRegistrationModal() {
            if (document.querySelector('.modal-overlay')) return;

            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.id = 'registrationModal';

            overlay.innerHTML = `<span class="game-btn green">
                <div class="modal-box">
                    
                    <h2 style="font-size:6vw;" >The game begins.<br> Ranking! Top 3</h2>
                    <p style="font-size:3vw;color:#fff;" >Enter your name to start competing.<br>among millions of players! Check your ranking.</p>
                    <input style="background-color: #fff;color:#000;" type="text" id="playerNameInput" placeholder="Seu nome..." maxlength="20" autocomplete="off">
                    <button class="game-btn orange full" id="confirmPlayerName">🎮 ENTER THE RANKING</button>
                    <span> ⭐ Your progress will be saved automatically.</span>
                </div></span>
            `;

            document.body.appendChild(overlay);

            // Impede scroll do body quando o modal está aberto
            document.body.style.overflow = 'hidden';

            setTimeout(() => {
                const input = document.getElementById('playerNameInput');
                if (input) input.focus();
            }, 400);

            // Fecha o modal ao clicar fora (no overlay)
            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) {
                    // Não fecha automaticamente para não perder os dados
                }
            });

            document.getElementById('confirmPlayerName').addEventListener('click', function() {
                const nameInput = document.getElementById('playerNameInput');
                const name = nameInput.value.trim();

                if (!name || name.length < 2) {
                    nameInput.style.borderColor = '#ff4444';
                    nameInput.value = '';
                    nameInput.placeholder = '⚠️ Mínimo 2 caracteres!';
                    nameInput.focus();
                    return;
                }

                PlayerManager.createPlayer(name);
                overlay.remove();
                document.body.style.overflow = '';
                showNotification(`Bem-vindo(a), ${name}! 🎉`, '👋');
                updateRanking();
            });

            document.getElementById('playerNameInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    document.getElementById('confirmPlayerName').click();
                }
            });

            // Fecha ao pressionar ESC
            document.addEventListener('keydown', function escHandler(e) {
                if (e.key === 'Escape') {
                    const modal = document.getElementById('registrationModal');
                    if (modal) {
                        // Não fecha automaticamente
                    }
                }
            });
        }

        // ============================================================
        // 🚀 INICIALIZAÇÃO
        // ============================================================
        function initRanking() {
            const player = PlayerManager.getPlayer();

            if (!player) {
                showRegistrationModal();
                const fakes = FAKE_PLAYERS.map(p => ({ ...p, isFake: true }));
                renderRanking(fakes);
                return;
            }

            const savedFakes = StorageManager.get('fakePlayersData', null);
            if (savedFakes && savedFakes.length === FAKE_PLAYERS.length) {
                savedFakes.forEach((fake, index) => {
                    if (FAKE_PLAYERS[index]) {
                        FAKE_PLAYERS[index].coins = fake.coins;
                        FAKE_PLAYERS[index].days = fake.days;
                    }
                });
            }

            const allPlayers = RankingManager.getAllPlayers();
            const sorted = allPlayers.sort((a, b) => b.coins - a.coins);
            renderRanking(sorted);

            setInterval(() => {
                const currentPlayer = PlayerManager.getPlayer();
                if (currentPlayer) {
                    const updatedFakes = RankingManager.updateFakePlayers(currentPlayer.totalCoins || 0);
                    updatedFakes.forEach((fake, index) => {
                        if (FAKE_PLAYERS[index]) {
                            FAKE_PLAYERS[index].coins = fake.coins;
                            FAKE_PLAYERS[index].days = fake.days;
                        }
                    });
                    StorageManager.set('fakePlayersData', FAKE_PLAYERS);
                    const all = RankingManager.getAllPlayers();
                    const sortedAll = all.sort((a, b) => b.coins - a.coins);
                    renderRanking(sortedAll);
                }
            }, 30000);

            showNotification('Ranking carregado! 🏆', '🏆');
        }

        // ============================================================
        // 🔄 EXPOR FUNÇÕES
        // ============================================================
        window.updateRanking = updateRanking;
        window.filterRanking = filterRanking;
        window.RankingManager = RankingManager;
        window.PlayerManager = PlayerManager;
        
        window.collectCoins = function(amount) {
            if (!PlayerManager.getPlayer()) {
                showNotification('Cadastre-se primeiro!', '⚠️');
                return false;
            }
            const success = PlayerManager.addCoinsAndDistribute(amount);
            if (success) {
                updateRanking();
                showNotification(`+${amount.toLocaleString()} moedas!`, '💰');
            }
            return success;
        };

        document.addEventListener('DOMContentLoaded', initRanking);
    </script>

    🎵 MÚSICA DE FUNDO
    ============================================================ -->
    <audio id="bgMusic" loop volume="0.5">
        <source src="nivel1.mp3" type="audio/mpeg">
     
    </audio>

    <script>
        // Inicia a música de fundo automaticamente assim que o usuário interagir com a página
        document.addEventListener('click', function() {
            const audio = document.getElementById('bgMusic');
            if (audio.paused) {
                audio.play().catch(e => console.log('Autoplay blocked by the browser.'));
            }
        }, { once: true });

        // Tentativa de iniciar a música automaticamente ao carregar a página
        window.addEventListener('load', function() {
            const audio = document.getElementById('bgMusic');
            audio.play().catch(e => {
                console.log('Autoplay blocked. Waiting for user interaction.');
            });
        });
    </script>
